<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yongsan ITX Guide VR</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: "Malgun Gothic", Arial, sans-serif;
}

#panorama {
  width: 100%;
  height: 100%;
}

.titleBox {
  position: absolute;
  top: 26px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0,0,0,0.68);
  color: #fff;
  padding: 16px 28px;
  border-radius: 16px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  line-height: 1.35;
}

.startMenu {
  position: absolute;
  inset: 0;
  z-index: 10000;
  background: rgba(0,0,0,0.78);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  text-align: center;
}

.startMenu h1 {
  font-size: 30px;
  margin-bottom: 28px;
}

.startMenu button {
  width: 82%;
  max-width: 420px;
  margin: 10px;
  padding: 18px 22px;
  border: none;
  border-radius: 18px;
  background: #fff;
  color: #000;
  font-size: 22px;
  font-weight: 800;
}

.custom-hotspot {
  width: 190px;
  height: 190px;
  border-radius: 50%;
  background: #fff;
  border: 5px solid rgba(0,0,0,0.25);
  box-shadow: 0 0 28px rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
}

.custom-hotspot::before {
  content: "➜";
  color: #000;
  font-size: 125px;
  font-weight: 900;
  line-height: 1;
}

@media (max-width: 768px) {
  .titleBox {
    font-size: 24px;
    padding: 14px 24px;
  }

  .custom-hotspot {
    width: 210px;
    height: 210px;
  }

  .custom-hotspot::before {
    font-size: 140px;
  }
}
</style>
</head>

<body>

<div id="panorama"></div>
<div id="titleBox" class="titleBox"></div>

<div id="startMenu" class="startMenu">
  <h1>용산역 ITX-청춘 탑승 안내 VR</h1>
  <button onclick="startRoute('outside')">① 용산역 밖에서 출발</button>
  <button onclick="startRoute('yeongdeungpo')">② 1호선 영등포 방향에서 도착</button>
  <button onclick="startRoute('seoul')">③ 1호선 서울역 방향에서 도착</button>
</div>

<script>
const scenes = {
  yongsan_outside_arrival: {
    title: "용산역 1번 출입구",
    image: "images/yongsan_outside_arrival.png",
    next: "meeting_point_cafe_mignon",
    yaw: 0,
    pitch: -5
  },

  line1_from_yeongdeungpo: {
    title: "1호선 도착 후 이동",
    image: "images/line1_from_yeongdeungpo.png",
    next: "meeting_point_cafe_mignon",
    yaw: 0,
    pitch: 0
  },

  line1_from_seoul_station: {
    title: "1호선 도착 후 이동",
    image: "images/line1_from_seoul_station.png",
    next: "meeting_point_cafe_mignon",
    yaw: 0,
    pitch: 0
  },

  meeting_point_cafe_mignon: {
    title: "집결 장소<br>(카페 미뇽)",
    image: "images/meeting_point_cafe_mignon.png",
    next: "meeting_point_platform_column",
    yaw: 0,
    pitch: 0
  },

  meeting_point_platform_column: {
    title: "전철 타는 곳 기둥 앞",
    image: "images/meeting_point_platform_column.png",
    next: "itx_ticket_gate",
    yaw: 0,
    pitch: 0
  },

  itx_ticket_gate: {
    title: "ITX 승차권 확인 게이트",
    image: "images/itx_ticket_gate.png",
    next: "itx_corridor",
    yaw: 0,
    pitch: 0
  },

  itx_corridor: {
    title: "타는 곳 1번 방향 이동",
    image: "images/itx_corridor.png",
    next: "itx_escalator",
    yaw: 0,
    pitch: 0
  },

  itx_escalator: {
    title: "1번 승강장으로 내려가기",
    image: "images/itx_escalator.png",
    next: "itx_platform1",
    yaw: 0,
    pitch: -5
  },

  itx_platform1: {
    title: "ITX-청춘 1번 승강장",
    image: "images/itx_platform1.png",
    next: "itx_boarding",
    yaw: 0,
    pitch: 0
  },

  itx_boarding: {
    title: "ITX-청춘 4호차 탑승",
    image: "images/itx_boarding.png",
    next: "itx_second_floor",
    yaw: 0,
    pitch: 0
  },

  itx_second_floor: {
    title: "ITX-청춘 객실 도착",
    image: "images/itx_second_floor.png",
    next: null,
    yaw: 0,
    pitch: 0
  }
};

let viewer = null;
let currentScene = null;

function startRoute(type) {
  document.getElementById("startMenu").style.display = "none";

  if (type === "outside") {
    loadScene("yongsan_outside_arrival");
  } else if (type === "yeongdeungpo") {
    loadScene("line1_from_yeongdeungpo");
  } else if (type === "seoul") {
    loadScene("line1_from_seoul_station");
  }
}

function loadScene(sceneId) {
  currentScene = sceneId;
  const scene = scenes[sceneId];

  document.getElementById("titleBox").innerHTML = scene.title;

  if (viewer) {
    viewer.destroy();
  }

  viewer = pannellum.viewer("panorama", {
    type: "equirectangular",
    panorama: scene.image,
    autoLoad: true,
    showZoomCtrl: true,
    compass: false,
    hfov: 110,
    minHfov: 70,
    maxHfov: 140,
    yaw: scene.yaw,
    pitch: scene.pitch,
    hotSpots: makeHotspots(scene)
  });
}

function makeHotspots(scene) {
  if (!scene.next) return [];

  return [{
    pitch: -8,
    yaw: 18,
    type: "custom",
    cssClass: "custom-hotspot",
    createTooltipFunc: hotspotTooltip,
    clickHandlerFunc: function() {
      loadScene(scene.next);
    }
  }];
}

function hotspotTooltip(hotSpotDiv) {
  hotSpotDiv.setAttribute("title", "다음 장면으로 이동");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>용산역 모임·ITX-청춘 탑승 VR 안내</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#000;
}

#panorama{
    width:100%;
    height:100%;
}

.sceneTitle{
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    background:rgba(0,0,0,.65);
    color:#fff;

    padding:16px 28px;
    border-radius:22px;

    font-size:22px;
    font-weight:700;
    text-align:center;

    backdrop-filter:blur(4px);
}

/* 시작 화면 */

#startScreen{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:18px;
    box-sizing:border-box;
}

.startBox{
    width:92%;
    max-width:720px;

    background:#fff;
    color:#000;

    border-radius:24px;

    padding:30px 24px 34px;
    text-align:center;

    box-sizing:border-box;
}

.startBox h1{
    margin:0 0 14px;

    font-size:32px;
    line-height:1.3;
    font-weight:800;
}

.introText{
    margin:0 0 26px;

    font-size:18px;
    line-height:1.6;

    color:#333;
}

.startBox button{
    width:100%;

    border:0;
    border-radius:14px;

    background:#1559d8;
    color:#fff;

    padding:18px 14px;
    margin:12px 0;

    cursor:pointer;

    font-weight:800;
}

.startBox button span{
    display:block;

    font-size:24px;
    line-height:1.3;
}

.startBox button small{
    display:block;

    margin-top:8px;

    font-size:14px;
    font-weight:700;

    opacity:.96;
}

/* 화살표 */

.custom-hotspot{
    width:58px;
    height:58px;

    border-radius:50%;

    background:#fff;
    border:4px solid #d9d9d9;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
    0 0 18px rgba(0,0,0,.35);

    cursor:pointer;
}

.custom-hotspot::before{
    content:"➜";

    font-size:38px;
    color:#000;
    font-weight:bold;
}

/* 모바일 */

@media(max-width:768px){

.sceneTitle{
    top:16px;

    padding:14px 22px;

    font-size:18px;
    border-radius:18px;

    max-width:80%;
}

.startBox{
    width:94%;
    padding:24px 18px 28px;
}

.startBox h1{
    font-size:25px;
}

.introText{
    font-size:15px;
}

.startBox button span{
    font-size:20px;
}

.startBox button small{
    font-size:13px;
}

/* 최종값 */

.custom-hotspot{
    width:58px;
    height:58px;
}

.custom-hotspot::before{
    font-size:38px;
}

}

</style>
</head>

<body>

<div id="panorama"></div>

<div class="sceneTitle" id="sceneTitle">
용산역 모임·ITX-청춘 탑승 VR 안내
</div>

<!-- 시작화면 -->

<div id="startScreen">

    <div class="startBox">

        <h1>
        용산역 모임·ITX-청춘 탑승 VR 안내
        </h1>

        <p class="introText">
        도착 위치를 선택하면 모임장소인 대합실(
        CAFE MIGNON)을 거쳐
        ITX-청춘 탑승까지 순서대로 이동합니다.
        </p>

        <button onclick="startRoute('outside')">
            <span>① 용산역 밖에서 도착</span>
            <small>
            용산역1번출구 → 모임장소 → ITX탑승
            </small>
        </button>

        <button onclick="startRoute('yeongdeungpo')">
            <span>② 1호선 영등포 방향에서 도착</span>
            <small>
            용산역하차 → 모임장소 → ITX탑승
            </small>
        </button>

        <button onclick="startRoute('seoul')">
            <span>③ 1호선 서울역 방향에서 도착</span>
            <small>
            용산역하차 → 모임장소 → ITX탑승
            </small>
        </button>

    </div>

</div>

<script>

let viewer;

const scenes = {

outside:{
    title:"용산역 1번 출구",
    panorama:"images/yongsan_outside_arrival.png",
    hotSpots:[
        {
            pitch:-8,
            yaw:10,
            type:"scene",
            text:"다음",
            sceneId:"meeting1",
            cssClass:"custom-hotspot"
        }
    ]
},

yeongdeungpo:{
    title:"1호선 영등포 방향에서 도착",
    panorama:"images/line1_from_yeongdeungpo.png",
    hotSpots:[
        {
            pitch:-4,
            yaw:0,
            type:"scene",
            text:"다음",
            sceneId:"meeting1",
            cssClass:"custom-hotspot"
        }
    ]
},

seoul:{
    title:"1호선 서울역 방향에서 도착",
    panorama:"images/line1_from_seoul_station.png",
    hotSpots:[
        {
            pitch:-5,
            yaw:0,
            type:"scene",
            text:"다음",
            sceneId:"meeting1",
            cssClass:"custom-hotspot"
        }
    ]
},

meeting1:{
    title:"집결 장소(대합실: CAFE MIGNON)",
    panorama:"images/meeting_point_cafe_mignon.png",
    hotSpots:[
        {
            pitch:-8,
            yaw:35,
            type:"scene",
            text:"다음",
            sceneId:"meeting2",
            cssClass:"custom-hotspot"
        }
    ]
},

meeting2:{
    title:"전철 타는 곳 기둥",
    panorama:"images/meeting_point_platform_column.png",
    hotSpots:[
        {
            pitch:-6,
            yaw:40,
            type:"scene",
            text:"다음",
            sceneId:"gate",
            cssClass:"custom-hotspot"
        }
    ]
},

gate:{
    title:"ITX 개찰구",
    panorama:"images/itx_ticket_gate.png",
    hotSpots:[
        {
            pitch:-6,
            yaw:20,
            type:"scene",
            text:"다음",
            sceneId:"corridor",
            cssClass:"custom-hotspot"
        }
    ]
},

corridor:{
    title:"ITX 이동 통로",
    panorama:"images/itx_corridor.png",
    hotSpots:[
        {
            pitch:-8,
            yaw:30,
            type:"scene",
            text:"다음",
            sceneId:"escalator",
            cssClass:"custom-hotspot"
        }
    ]
},

escalator:{
    title:"플랫폼 가는 에스컬레이터",
    panorama:"images/itx_escalator.png",
    hotSpots:[
        {
            pitch:-12,
            yaw:-20,
            type:"scene",
            text:"다음",
            sceneId:"platform",
            cssClass:"custom-hotspot"
        }
    ]
},

platform:{
    title:"ITX 입구",
    panorama:"images/itx_platform1.png",
    hotSpots:[
        {
            pitch:-5,
            yaw:15,
            type:"scene",
            text:"다음",
            sceneId:"boarding",
            cssClass:"custom-hotspot"
        }
    ]
},

boarding:{
    title:"ITX 탑승",
    panorama:"images/itx_boarding.png",
    hotSpots:[
        {
            pitch:-3,
            yaw:0,
            type:"scene",
            text:"다음",
            sceneId:"secondfloor",
            cssClass:"custom-hotspot"
        }
    ]
},

secondfloor:{
    title:"ITX 2층 객실",
    panorama:"images/itx_second_floor.png"
}

};

function startRoute(route){

    document.getElementById("startScreen").style.display="none";

    viewer = pannellum.viewer('panorama',{

        default:{
            firstScene:route,
            sceneFadeDuration:1000,
            autoLoad:true
        },

        scenes:scenes

    });

    viewer.on('scenechange',function(sceneId){
        document.getElementById("sceneTitle").innerText =
        scenes[sceneId].title;
    });

    document.getElementById("sceneTitle").innerText =
    scenes[route].title;
}

</script>

</body>
</html>
